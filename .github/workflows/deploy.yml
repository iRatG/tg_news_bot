# ── CI/CD Pipeline: Build → Healthcheck → Deploy ─────────────────────────────
#
# Триггеры:
#   - Push в ветку main (production deploy)
#   - Push в ветку dev (только build + healthcheck, без deploy)
#   - Ручной запуск через GitHub Actions UI
#
# Секреты GitHub (Settings → Secrets → Actions):
#   VPS_HOST          — IP или hostname VPS
#   VPS_USER          — SSH-пользователь (обычно root или deploy)
#   VPS_SSH_KEY       — приватный SSH-ключ (id_rsa)
#   VPS_DEPLOY_PATH   — путь на VPS, напр. /opt/tg_news_bot
#   OPENAI_API_KEY
#   PERPLEXITY_API_KEY
#   TELEGRAM_BOT_TOKEN
#   TELEGRAM_CHANNEL_ID
#   TELEGRAM_ADMIN_CHAT_ID
#   ADMIN_PASSWORD
#   LEONARDO_API_KEY        (опционально)
#   LEONARDO_MODEL_ID       (опционально)

name: Deploy NewsBot

on:
  push:
    branches: [ main, dev ]
  workflow_dispatch:        # Ручной запуск

env:
  PYTHON_VERSION: "3.11"
  DEPLOY_PATH:    ${{ secrets.VPS_DEPLOY_PATH }}

jobs:
  # ── Job 1: Lint + unit-check ─────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install --quiet -r requirements.txt

      - name: Check syntax (py_compile)
        run: |
          python -m py_compile main.py
          find . -name "*.py" \
            ! -path "./.git/*" \
            ! -path "./scripts/init_db.py" \
            -exec python -m py_compile {} \;
          echo "Syntax OK"

  # ── Job 2: Healthcheck (только main) ─────────────────────────────────────────
  healthcheck:
    name: Healthcheck
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main'
    env:
      OPENAI_API_KEY:          ${{ secrets.OPENAI_API_KEY }}
      PERPLEXITY_API_KEY:      ${{ secrets.PERPLEXITY_API_KEY }}
      TELEGRAM_BOT_TOKEN:      ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHANNEL_ID:     ${{ secrets.TELEGRAM_CHANNEL_ID }}
      TELEGRAM_ADMIN_CHAT_ID:  ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
      ADMIN_PASSWORD:          ${{ secrets.ADMIN_PASSWORD }}
      LEONARDO_API_KEY:        ${{ secrets.LEONARDO_API_KEY }}
      LEONARDO_MODEL_ID:       ${{ secrets.LEONARDO_MODEL_ID }}
      DATABASE_URL:            "sqlite+aiosqlite:////tmp/newsbot_ci.db"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install --quiet -r requirements.txt

      - name: Init test DB
        run: python scripts/init_db.py

      - name: Run healthcheck
        run: python scripts/healthcheck.py

  # ── Job 3: Deploy на VPS (только main, после healthcheck) ────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: healthcheck
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync code to VPS (rsync)
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='*.db' \
            --exclude='data/' \
            --exclude='logs/' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.env' \
            ./ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ env.DEPLOY_PATH }}/"

      - name: Write .env on VPS
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "cat > ${{ env.DEPLOY_PATH }}/.env" << 'ENVEOF'
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          PERPLEXITY_API_KEY=${{ secrets.PERPLEXITY_API_KEY }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID=${{ secrets.TELEGRAM_CHANNEL_ID }}
          TELEGRAM_ADMIN_CHAT_ID=${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
          ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
          LEONARDO_API_KEY=${{ secrets.LEONARDO_API_KEY }}
          LEONARDO_MODEL_ID=${{ secrets.LEONARDO_MODEL_ID }}
          DATABASE_URL=sqlite+aiosqlite:////app/data/newsbot.db
          ENVEOF

      - name: Build & restart Docker container on VPS
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" bash << 'SSHEOF'
          set -e
          cd ${{ env.DEPLOY_PATH }}

          echo "==> Building Docker image..."
          docker build -t newsbot:latest .

          echo "==> Stopping old container (if running)..."
          docker stop newsbot 2>/dev/null || true
          docker rm   newsbot 2>/dev/null || true

          echo "==> Starting new container..."
          docker run -d \
            --name newsbot \
            --restart unless-stopped \
            -p 8000:8000 \
            -v ${{ env.DEPLOY_PATH }}/data:/app/data \
            -v ${{ env.DEPLOY_PATH }}/logs:/app/logs \
            --env-file ${{ env.DEPLOY_PATH }}/.env \
            newsbot:latest

          echo "==> Waiting for container to start (15s)..."
          sleep 15

          echo "==> Checking container health..."
          curl -f http://localhost:8000/health && echo "  Health OK" || exit 1

          echo "==> Deploy complete!"
          SSHEOF

      - name: Notify admin on success
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}" \
            -d "text=✅ NewsBot задеплоен%0Acommit: ${{ github.sha }}%0Abranch: ${{ github.ref_name }}" \
            -d "parse_mode=HTML" || true

      - name: Notify admin on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}" \
            -d "text=❌ NewsBot deploy FAILED%0Acommit: ${{ github.sha }}%0Abranch: ${{ github.ref_name }}%0ASee: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -d "parse_mode=HTML" || true
