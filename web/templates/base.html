<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NewsBot{% endblock %}</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg:       #0f1117;
            --surface:  #1a1d27;
            --border:   #2a2d3e;
            --text:     #e2e8f0;
            --muted:    #94a3b8;
            --accent:   #6366f1;
            --green:    #22c55e;
            --yellow:   #f59e0b;
            --red:      #ef4444;
            --blue:     #3b82f6;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            font-size: 14px;
            line-height: 1.6;
        }
        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        header h1 { font-size: 18px; font-weight: 600; }
        header nav a {
            color: var(--muted);
            text-decoration: none;
            margin-left: 20px;
            font-size: 13px;
            transition: color 0.2s;
            padding: 4px 10px;
            border-radius: 6px;
        }
        header nav a:hover { color: var(--text); background: rgba(255,255,255,0.05); }
        header nav a.active { color: var(--text); background: var(--border); }
        main { padding: 24px; max-width: 1400px; margin: 0 auto; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }
        .card h3 {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--muted);
            margin-bottom: 16px;
        }
        .card-full { grid-column: 1 / -1; }
        .stat-row {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
        }
        .stat {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px 20px;
            flex: 1;
        }
        .stat .value {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent);
        }
        .stat .label {
            font-size: 12px;
            color: var(--muted);
            margin-top: 4px;
        }
        button.run-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 8px 18px;
            font-size: 13px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button.run-btn:hover { opacity: 0.85; }
        button.run-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th {
            text-align: left;
            color: var(--muted);
            font-weight: 500;
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
        }
        td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
        tr:last-child td { border-bottom: none; }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        .badge-ok       { background: #16451d; color: var(--green); }
        .badge-rejected { background: #451616; color: var(--red); }
        .badge-error    { background: #453616; color: var(--yellow); }
        #toast {
            position: fixed; bottom: 24px; right: 24px;
            background: var(--accent); color: #fff;
            padding: 12px 20px; border-radius: 8px;
            display: none; font-size: 13px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>
    <header>
        <h1>📡 NewsBot</h1>
        <nav>
            <a href="/dashboard" id="nav-dashboard">Дашборд</a>
            <a href="/admin" id="nav-admin">Настройки</a>
        </nav>
    </header>
    <script>
        // Подсвечиваем активную ссылку
        (function() {
            const path = window.location.pathname;
            if (path.startsWith('/dashboard')) document.getElementById('nav-dashboard').classList.add('active');
            if (path.startsWith('/admin'))     document.getElementById('nav-admin').classList.add('active');
        })();
    </script>
    <main>
        {% block content %}{% endblock %}
    </main>
    <div id="toast"></div>
    <script>
        function showToast(msg, ms=3000) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', ms);
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
